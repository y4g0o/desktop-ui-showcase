<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metro UI – Design Web N2</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1 class="titulo">Iniciar</h1>

  <div class="grid">

    <!-- Linha 1 -->

    <!-- Tile largo: Projetos (spans 2 colunas) -->
    <div class="tile tile-wide t-blue tile-live">
      <div class="tile-icon">🖥️</div>
      <div class="tile-label">Projetos</div>
      <div class="live-info">C-D-H · Lab · Clone TabNews</div>
    </div>

    <!-- Tile: Código -->
    <div class="tile t-teal">
      <div class="tile-icon">💻</div>
      <div class="tile-label">Código</div>
    </div>

    <!-- Tile alto: Tarefas (spans 2 linhas) -->
    <div class="tile tile-tall t-purple">
      <span class="badge">5</span>
      <div class="tile-icon">📋</div>
      <div class="tile-label">Tarefas</div>
    </div>

    <!-- Tile: Banco de Dados -->
    <div class="tile t-dark">
      <div class="tile-icon">🗄️</div>
      <div class="tile-label">Banco de Dados</div>
    </div>

    <!-- Linha 2 -->

    <!-- Tile: IA Agente -->
    <div class="tile t-indigo">
      <div class="tile-icon">🤖</div>
      <div class="tile-label">IA Agente</div>
    </div>

    <!-- Tile: GitHub -->
    <div class="tile t-dark">
      <div class="tile-icon">🐙</div>
      <div class="tile-label">GitHub</div>
    </div>

    <!-- Tile: Terminal -->
    <div class="tile t-green">
      <div class="tile-icon">⌨️</div>
      <div class="tile-label">Terminal</div>
    </div>

    <!-- Tile largo: Design Web (spans 2 cols) -->
    <div class="tile tile-wide t-pink">
      <div class="tile-icon">🎨</div>
      <div class="tile-label">Design Web</div>
    </div>

    <!-- Linha 3 -->

    <!-- Tile: Compilador -->
    <div class="tile t-orange">
      <div class="tile-icon">⚙️</div>
      <div class="tile-label">Compilador</div>
    </div>

    <!-- Tile: Faculdade -->
    <div class="tile t-cyan">
      <div class="tile-icon">🎓</div>
      <div class="tile-label">Faculdade</div>
    </div>

    <!-- Tile: Documentos -->
    <div class="tile t-teal">
      <div class="tile-icon">📂</div>
      <div class="tile-label">Documentos</div>
    </div>

    <!-- Tile: Configurações -->
    <div class="tile t-dark">
      <div class="tile-icon">⚙️</div>
      <div class="tile-label">Configurações</div>
    </div>

    <!-- Tile: Câmera -->
    <div class="tile t-red">
      <div class="tile-icon">📷</div>
      <div class="tile-label">Câmera</div>
    </div>

  </div>
</body>
</html>
